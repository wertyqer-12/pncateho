name: Build QMK Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GCC
        run: |
          sudo apt update
          sudo apt install -y gcc-arm-none-eabi

      - name: Install QMK CLI
        run: |
          python3 -m pip install --upgrade pip
          pip3 install qmk
          qmk setup -H /home/runner/qmk_firmware -y

      - name: Copy keyboard files
        run: |
          mkdir -p /home/runner/qmk_firmware/keyboards/alko
          cp -r pncateho /home/runner/qmk_firmware/keyboards/alko/

      - name: Compile firmware (vial)
        run: |
          cd /home/runner/qmk_firmware
          qmk compile -kb alko/pncateho -km vial

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: /home/runner/qmk_firmware/*.uf2
